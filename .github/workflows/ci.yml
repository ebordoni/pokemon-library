name: CI

# Esegue la stessa compilazione TypeScript (`tsc`) del build Docker dell'addon,
# così gli errori tipo TS2304 (import mancanti) vengono intercettati su GitHub
# prima di provare a installare/aggiornare l'addon su Home Assistant.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build ${{ matrix.package }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package: [backend, frontend]

    defaults:
      run:
        working-directory: addon/${{ matrix.package }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: addon/${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc)
        run: npm run build

  db-smoke:
    name: DB migration smoke test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: addon/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: addon/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run migration smoke test
        run: npm run smoke
